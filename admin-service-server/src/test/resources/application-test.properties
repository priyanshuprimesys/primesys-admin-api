# Merged on top of application.properties when @ActiveProfiles("test") is active.
# Only overrides properties that need real env vars or would cause eager connections.

spring.data.mongodb.uri=mongodb://localhost:27017/test_admin
spring.data.mongodb.backup.uri=mongodb://localhost:27017/test_admin_backup
spring.data.mongodb.auto-index-creation=false

application.security.jwt.secret-key=test-secret-key-for-unit-testing-purposes-only-32x
application.security.jwt.expiration=3600000
application.security.jwt.refresh-token.expiration=604800000

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

spring.mail.username=test@localhost
spring.mail.password=test

primesys.device.command.host=localhost
primesys.device.command.port=4545
